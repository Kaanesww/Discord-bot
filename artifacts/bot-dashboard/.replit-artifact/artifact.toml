kind = "web"
previewPath = "/"
title = "Bot Dashboard"
version = "1.0.0"
id = "artifacts/bot-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/bot-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bot-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/bot-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
